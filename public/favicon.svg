<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- پس‌زمینه مربع با گوشه‌های گرد و رنگ سبز پرایمری برند شما -->
  <rect width="32" height="32" rx="8" fill="#52c493" />
  
  <!-- حرف S در مرکز با فونت ضخیم و رنگ تیره متناسب با متن روی پرایمری -->
  <text x="50%" y="55%" font-family="sans-serif" font-weight="900" font-size="18" fill="#1b222c" text-anchor="middle" dom-baseline="central" alignment-baseline="central">
    S
  </text>
</svg>
